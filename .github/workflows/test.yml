name: test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # - name: Check PowerShell
      #   run: $PSVersionTable
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Check Node.js version
      #   run: node -v
      - name: npm install
        working-directory: ./frontend
        run: npm i

      - name: npm run
        working-directory: ./frontend
        run:  npm run build

#run 은 계속 돌아가게 되는 테스트 같은 느낌 dev 가 아니라 build 로 배포를 해야됨
#service program 을 nginx에 올리자
      - name: nginx start
        run: |
           docker rm -f web
           docker run -d -p 80:80 -v ./frontend/dist:/usr/share/nginx/html -v ./frontend/default.conf:/etc/nginx/conf.d/default.conf --name web nginx:1.28



#working directory의 경우 직접 넣을거냐 아니면 run 에 넣을거냐 를 판단
#지금 까지는 localhost 에서 돌아가는 환경,
#domain 추가 방법, 내부는 ip, 외부는 할당된 port
#react - router 실행하려면 router 설정파일이 있어야 한다
#rm -f web web 이란 도커가 있으면 삭제해라
#docker port 의 경우 왼쪽이 외부, 오른쪽이 내부

      - name: uv image build
        working-directory: ./backend
        run: docker build -t uv:1 .


      - name: fastapi run
        run: docker run -d -p 8001:8000 -v ./backend:/workspace --name back uv:1

