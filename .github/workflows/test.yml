name: test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      # - name: Check PowerShell
      #   run: $PSVersionTable
      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Check Node.js version
      #   run: node -v
      - name: npm install
        working-directory: ./frontend
        run: npm i

      - name: npm run
        working-directory: ./frontend
        run : npm run build

#run 은 계속 돌아가게 되는 테스트 같은 느낌 dev 가 아니라 build 로 배포를 해야됨